<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Optimizer | Test Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

        header { grid-column: span 2; margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .status-badge { padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.8rem; font-weight: 600; background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        textarea, input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1rem;
            border-radius: 0.75rem;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
        }
        textarea:focus, input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        button {
            cursor: pointer;
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button.secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); }
        button.secondary:hover { background: rgba(255, 255, 255, 0.1); }

        .itinerary-list { list-style: none; margin-top: 1rem; }
        .stop-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .stop-time { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent-color); }
        .stop-name { font-weight: 600; margin: 0.3rem 0; }
        .stop-meta { font-size: 0.8rem; color: var(--text-secondary); display: flex; gap: 1rem; }

        .simulator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }

        #debug-output {
            grid-column: span 2;
            background: #000;
            padding: 1rem;
            border-radius: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            overflow-x: auto;
            max-height: 300px;
            color: #10b981;
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loader">
        <p>Thinking...</p>
    </div>

    <header>
        <h1>AI Travel Optimizer — Lab</h1>
        <div class="status-badge" id="health-status">System Online</div>
    </header>

    <div class="container">
        <!-- STEP 1: INITIATE -->
        <div class="section">
            <h2>1. Khởi tạo Lộ trình</h2>
            <div class="form-group">
                <label>Prompt (Ý tưởng chuyến đi)</label>
                <textarea id="prompt" rows="3" placeholder="Ví dụ: Tôi muốn đi tham quan Huế 1 ngày, bắt đầu từ 8h sáng, thích ăn bún bò và xem lăng tẩm..."></textarea>
            </div>
            <div class="simulator-grid">
                <div class="form-group">
                    <label>Thời tiết</label>
                    <select id="weather">
                        <option value="clear">Trời trong (Clear)</option>
                        <option value="rain">Trời mưa (Rain)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Giờ bắt đầu</label>
                    <input type="time" id="start_time" value="08:00">
                </div>
            </div>
            <button onclick="createPlan()">Xây dựng Lộ trình</button>
        </div>

        <!-- STEP 2: SIMULATOR -->
        <div class="section" id="simulator-section" style="opacity: 0.5; pointer-events: none;">
            <h2>2. Giả lập tình huống (E2E)</h2>
            <div class="form-group">
                <label>Trip ID: <span id="display-trip-id" style="color: var(--accent-color)">---</span></label>
            </div>
            <div class="simulator-grid">
                <div class="form-group">
                    <label>Số phút trễ (+)</label>
                    <input type="number" id="minutes_late" value="30">
                </div>
                <div class="form-group">
                    <label>Loại Trigger</label>
                    <select id="trigger_kind">
                        <option value="delayed">Manual Delay</option>
                        <option value="geofence">Geofence Exit (Auto)</option>
                        <option value="rain">Weather Trigger</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                 <label>Điểm đã đi qua (Visited IDs): <span id="visited-list">None</span></label>
            </div>
            <button class="secondary" onclick="triggerReroute()">Kích hoạt Reroute</button>
        </div>

        <!-- RESULTS -->
        <div class="section" style="grid-column: span 2">
            <h2>3. Lộ trình chi tiết</h2>
            <div id="itinerary-view">
                <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">Chưa có lộ trình. Vui lòng nhập Prompt bên trên.</p>
            </div>
        </div>

        <!-- DEBUG -->
        <div class="section" style="grid-column: span 2">
            <h2>Diagnostics & Raw Data</h2>
            <pre id="debug-output">// API response data will appear here...</pre>
        </div>
    </div>

    <script>
        let currentTrip = null;
        let visitedIds = [];

        async function updateHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                document.getElementById('health-status').textContent = data.status === 'ok' ? 'System Ready' : 'Database Offline';
            } catch (e) {
                document.getElementById('health-status').textContent = 'Server Unreachable';
            }
        }

        async function createPlan() {
            const prompt = document.getElementById('prompt').value;
            const weather = document.getElementById('weather').value;
            const startTime = document.getElementById('start_time').value;

            if (!prompt) return alert('Vui lòng nhập prompt');

            showLoader(true);
            try {
                const response = await fetch('/plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        weather: weather,
                        current_time: startTime,
                        device_token: "test_device_token_web"
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    currentTrip = data;
                    visitedIds = [];
                    renderTrip(data);
                    enableSimulator(true);
                } else {
                    alert('Lỗi: ' + data.detail);
                }
            } catch (err) {
                alert('Mất kết nối server');
            } finally {
                showLoader(false);
            }
        }

        async function triggerReroute() {
            if (!currentTrip) return;

            const late = document.getElementById('minutes_late').value;
            const kind = document.getElementById('trigger_kind').value;
            const weather = document.getElementById('weather').value;

            showLoader(true);
            try {
                const response = await fetch('/reroute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trip_id: currentTrip.trip_id,
                        trigger: { kind: kind, minutes_late: parseInt(late) },
                        weather: weather,
                        visited_poi_ids: visitedIds,
                        device_token: "test_device_token_web"
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    currentTrip = data;
                    renderTrip(data);
                } else {
                    alert('Reroute Blocked: ' + data.detail);
                }
            } catch (err) {
                alert('Lỗi khi reroute');
            } finally {
                showLoader(false);
            }
        }

        function renderTrip(trip) {
            document.getElementById('display-trip-id').textContent = trip.trip_id;
            document.getElementById('debug-output').textContent = JSON.stringify(trip, null, 2);
            document.getElementById('visited-list').textContent = visitedIds.length > 0 ? visitedIds.join(', ') : 'None';

            const view = document.getElementById('itinerary-view');
            view.innerHTML = '';

            trip.itinerary.forEach((stop, index) => {
                const isVisited = visitedIds.includes(stop.poi_id);
                const card = document.createElement('div');
                card.className = 'stop-card';
                card.style.opacity = isVisited ? '0.5' : '1';
                card.style.borderLeft = isVisited ? '4px solid var(--success)' : '4px solid var(--accent-color)';

                card.innerHTML = `
                    <div class="stop-time">${stop.arrival_time} — ${stop.departure_time}</div>
                    <div class="stop-name">${stop.name} ${isVisited ? '✅' : ''}</div>
                    <div class="stop-meta">
                        <span>🏷️ ${stop.tags.slice(0,2).join(', ')}</span>
                        <span>⏱️ ${stop.visit_minutes}p</span>
                        <span>💰 ${stop.ticket_price.toLocaleString()}đ</span>
                    </div>
                    ${!isVisited ? `
                        <button class="secondary" style="margin-top: 1rem; padding: 0.4rem; font-size: 0.7rem; width: auto;" 
                        onclick="markVisited('${stop.poi_id}')">Check-in</button>
                    ` : ''}
                `;
                view.appendChild(card);
            });

            if (trip.diagnostics.notes.length > 0) {
                const notes = document.createElement('div');
                notes.style.marginTop = '1rem';
                notes.style.padding = '1rem';
                notes.style.background = 'rgba(245, 158, 11, 0.1)';
                notes.style.border = '1px solid var(--warning)';
                notes.style.borderRadius = '0.5rem';
                notes.innerHTML = `<h4 style="color: var(--warning); font-size: 0.8rem;">System Notes:</h4>
                                  <ul style="font-size: 0.8rem; list-style: inside;">${trip.diagnostics.notes.map(n => `<li>${n}</li>`).join('')}</ul>`;
                view.appendChild(notes);
            }
        }

        function markVisited(id) {
            if (!visitedIds.includes(id)) {
                visitedIds.push(id);
                renderTrip(currentTrip);
            }
        }

        function enableSimulator(val) {
            const sim = document.getElementById('simulator-section');
            sim.style.opacity = val ? '1' : '0.5';
            sim.style.pointerEvents = val ? 'all' : 'none';
        }

        function showLoader(val) {
            document.getElementById('loader').style.display = val ? 'flex' : 'none';
        }

        updateHealth();
        setInterval(updateHealth, 5000);
    </script>
</body>
</html>
