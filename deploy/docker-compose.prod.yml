services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: itinerary-api
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      OSRM_BASE_URL: http://osrm:5000
      POSTGIS_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgis:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    expose:
      - "8000"
    depends_on:
      - redis
      - postgis
      - osrm
    volumes:
      - ../data:/srv/app/data:ro
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgis:
    image: postgis/postgis:16-3.4
    container_name: itinerary-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: itinerary-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 20s
      timeout: 5s
      retries: 5

  osrm:
    image: osrm/osrm-backend:latest
    container_name: itinerary-osrm
    restart: unless-stopped
    command: osrm-routed --algorithm ch /data/hue.osrm
    expose:
      - "5000"
    volumes:
      - ../osrm-data:/data
    networks:
      - travel-network
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    container_name: itinerary-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    networks:
      - travel-network

  certbot:
    image: certbot/certbot:latest
    container_name: itinerary-certbot
    restart: "no"
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c
    command: >-
      "trap exit TERM;
       while :; do
         certbot renew --quiet;
         sleep 12h & wait $$!;
       done"

networks:
  travel-network:
    driver: bridge

volumes:
  postgis-data:
  redis-data:
  certbot-webroot:
