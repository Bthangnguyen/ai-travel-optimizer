services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: itinerary-api
    environment:
      APP_ENV: integration
      DATA_PATH: /srv/app/data/sample_pois.json
      POI_SOURCE: postgis
      POSTGIS_DSN: postgresql://itinerary:itinerary@postgis:5432/itinerary
      OSRM_BASE_URL: http://osrm:5000
      REDIS_URL: redis://redis:6379/0
      STATE_STORE_MODE: redis_required
      REROUTE_COOLDOWN_SECONDS: 180
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgis
    volumes:
      - ./data:/srv/app/data:ro

  postgis:
    image: postgis/postgis:16-3.4
    container_name: itinerary-postgis
    environment:
      POSTGRES_DB: itinerary
      POSTGRES_USER: itinerary
      POSTGRES_PASSWORD: itinerary
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: itinerary-redis
    ports:
      - "6379:6379"

  osrm:
    image: osrm/osrm-backend:latest
    container_name: itinerary-osrm
    command: osrm-routed --algorithm mld /data/vietnam-latest.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data

volumes:
  postgis-data:
